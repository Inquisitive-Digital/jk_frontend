name: 1 - Dev Branch Check

on:
  push:
    branches:
      - dev

jobs:
  lint-and-build:
    name: Lint & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (Lint Check)
        run: npm run lint

      - name: Run Build
        run: npm run build

      - name: Confirm build output exists
        run: |
          if [ -d "dist" ]; then
            echo "✅ Build successful! dist/ folder exists."
          else
            echo "❌ Build failed! dist/ folder not found."
            exit 1
          fi
